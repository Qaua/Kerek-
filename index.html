<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<title>💰 Мөнгөний Дэвтэр</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#111827;color:#F9FAFB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100%;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
input,button{font-family:inherit;outline:none;-webkit-appearance:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}

/* SCREEN */
.screen{min-height:100vh;background:#111827;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

/* CARD */
.card{background:#1F2937;border-radius:16px;border:1px solid #374151;padding:16px;margin-bottom:0}
.card-blue{background:#1e3a5f;border:1px solid #2563eb44}
.card-green{background:#14532d;border:1px solid #16a34a44}
.card-red{background:#450a0a;border:1px solid #dc262644}
.card-yellow{background:#451a03;border:1px solid #d9770644}

/* INPUT */
.inp{width:100%;background:#374151;border:1px solid #4B5563;border-radius:10px;padding:12px 14px;color:#F9FAFB;font-size:15px}
.inp:focus{border-color:#6366f1;background:#374151}
.inp-pin{text-align:center;font-size:24px;letter-spacing:12px}

/* BUTTON */
.btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-size:14px;font-weight:700;color:#fff;cursor:pointer}
.btn:active{opacity:.8}
.btn-purple{background:#6366f1}
.btn-green{background:#16a34a}
.btn-red{background:#dc2626}
.btn-orange{background:#d97706}
.btn-gray{background:#374151;border:1px solid #4B5563;color:#D1D5DB}
.btn-sm{width:auto;display:inline-block;padding:6px 12px;border-radius:8px;font-size:12px}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}

/* HEADER */
.hdr{background:#1F2937;border-bottom:1px solid #374151;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:99}
.hdr-left .app-name{font-size:16px;font-weight:900;color:#F9FAFB}
.hdr-left .app-sub{font-size:11px;color:#9CA3AF;margin-top:1px}
.hdr-right{display:flex;gap:6px;align-items:center}
.hdr-btn{padding:6px 10px;border-radius:8px;border:1px solid #374151;background:#374151;color:#D1D5DB;font-size:11px;font-weight:700;cursor:pointer}
.pro-badge{background:#d97706;color:#fff;font-size:9px;padding:2px 6px;border-radius:5px;font-weight:800;margin-left:5px;vertical-align:middle}

/* TABS */
.tabs{background:#1F2937;border-bottom:1px solid #374151;padding:8px 12px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:7px 12px;border-radius:20px;border:none;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;background:#374151;color:#9CA3AF}
.tab-btn.on{background:#6366f1;color:#fff}

/* LANG BTN */
.lang-btn{padding:5px 9px;border-radius:8px;border:1px solid #374151;background:#374151;color:#9CA3AF;font-size:11px;font-weight:700;cursor:pointer}
.lang-btn.on{border-color:#6366f1;background:#1e1b4b;color:#a5b4fc}

/* CONTENT */
.content{padding:12px;display:flex;flex-direction:column;gap:12px;padding-bottom:80px}

/* STAT GRID */
.stats3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sbox{background:#1F2937;border:1px solid #374151;border-radius:14px;padding:12px 8px;text-align:center}
.sbox-ic{font-size:20px}
.sbox-lbl{font-size:11px;color:#9CA3AF;margin-top:4px;font-weight:500}
.sbox-val{font-size:13px;font-weight:800;margin-top:4px}

/* HEALTH */
.hbar-bg{background:#374151;border-radius:8px;height:10px;overflow:hidden;margin:8px 0}
.hbar{height:100%;border-radius:8px;transition:width .8s}
.score3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.sco-box{background:#374151;border-radius:10px;padding:10px;text-align:center}
.sco-lbl{font-size:11px;color:#9CA3AF;font-weight:500}
.sco-num{font-size:22px;font-weight:900;margin:4px 0}
.sco-sub{font-size:10px;color:#6B7280}

/* ROW */
.row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #374151}
.row:last-child{border-bottom:none}
.row-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-right:10px}
.row-body{flex:1;min-width:0}
.row-title{font-size:13px;font-weight:600;color:#F9FAFB;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:11px;color:#6B7280;margin-top:2px}
.row-right{flex-shrink:0;margin-left:10px;display:flex;align-items:center;gap:8px}
.row-amt{font-size:13px;font-weight:700}

/* PIE */
.pie-wrap{display:flex;align-items:center;gap:14px}
.pie-legend{flex:1;display:flex;flex-direction:column;gap:6px}
.leg-row{display:flex;align-items:center;gap:6px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-nm{font-size:11px;color:#9CA3AF;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.leg-val{font-size:11px;font-weight:700;color:#F9FAFB}

/* BAR */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:90px;padding-bottom:18px}
.bar-i{flex:1;border-radius:4px 4px 0 0;min-height:4px;position:relative}
.bar-lbl{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:#6B7280;white-space:nowrap}

/* CAT GRID */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cat-btn{padding:10px;border-radius:10px;border:2px solid transparent;background:#374151;color:#D1D5DB;font-size:12px;text-align:left;cursor:pointer;font-weight:500}
.cat-btn.on{border-color:var(--cc);color:#fff}

/* PROGRESS */
.prog{margin-bottom:14px}
.prog-hd{display:flex;justify-content:space-between;font-size:12px;color:#D1D5DB;margin-bottom:5px;font-weight:500}
.prog-hd span:last-child{font-weight:700}
.prog-bg{background:#374151;border-radius:6px;height:8px}
.prog-fill{height:100%;border-radius:6px}
.prog-note{font-size:10px;color:#6B7280;margin-top:3px}

/* ADVICE */
.adv-card{border-radius:14px;padding:14px;display:flex;gap:10px;margin-bottom:0}
.adv-ic{font-size:22px;flex-shrink:0}
.adv-hd{font-size:13px;font-weight:700;margin-bottom:4px}
.adv-txt{font-size:12px;line-height:1.7;color:#D1D5DB}

/* TIP */
.tip-card{border-radius:12px;padding:14px;border-left:3px solid}
.tip-hd{font-size:13px;font-weight:700;margin-bottom:5px}
.tip-txt{font-size:12px;line-height:1.75;color:#D1D5DB}

/* BIZ */
.biz4{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.biz-box{background:#1F2937;border:1px solid #374151;border-radius:12px;padding:12px;text-align:center}
.biz-lbl{font-size:11px;color:#9CA3AF;margin-bottom:5px;font-weight:500}
.biz-val{font-size:15px;font-weight:900;color:#F9FAFB}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}

/* ERR */
.err{background:#450a0a;border:1px solid #dc262655;border-radius:10px;padding:10px 12px;font-size:13px;color:#FCA5A5;margin-top:8px}

/* SEC TITLE */
.sec-title{font-size:15px;font-weight:800;color:#F9FAFB}

/* FILTER */
.filters{display:flex;gap:5px;flex-wrap:wrap}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid #374151}

/* UPLOAD */
.upload-area{background:#1F2937;border:2px dashed #4B5563;border-radius:16px;padding:30px 20px;text-align:center}
.upload-area:hover{border-color:#6366f1}

/* COLORS */
.green{color:#22c55e}.red{color:#ef4444}.amber{color:#f59e0b}.blue{color:#6366f1}

// SHA256
// ════════════════════════════════════════════
async function sha256(t){
  try{
    var b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));
    return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,"0")}).join("");
  }catch{
    var h=0;for(var i=0;i<t.length;i++)h=(Math.imul(31,h)+t.charCodeAt(i))|0;
    return"f_"+Math.abs(h).toString(16);
  }
}

var CH={
  date:["огноо","гүйлгээний огноо","date","он сар өдөр"],
  credit:["кредит гүйлгээ","кредит","орлого","credit","нэмэгдэл"],
  debit:["дебит гүйлгээ","дебит","зарлага","debit","хасагдал"],
  desc:["гүйлгээний утга","утга","description","тайлбар"]
};
function dCols(row){
  var m={};
  (row||[]).forEach(function(c,i){
    var v=String(c||"").toLowerCase().trim();
    Object.keys(CH).forEach(function(k){if(!m[k]&&CH[k].some(function(h){return v.indexOf(h)>=0}))m[k]=i});
  });return m;
}
function parseBank(data){
  var hdr=-1,cols={};
  for(var i=0;i<Math.min(data.length,20);i++){var m=dCols(data[i]);if(Object.keys(m).length>=3){hdr=i;cols=m;break}}
  if(hdr<0)return null;
  var owner="",period="";
  for(var i=0;i<hdr;i++){
    (data[i]||[]).forEach(function(c,j){
      var v=String(c||"").toLowerCase();
      if(v.indexOf("хэрэглэгч")>=0){var n=data[i][j+3]||data[i][j+2]||data[i][j+1];if(n)owner=String(n).trim()}
      if(v.indexOf("интервал")>=0){var n=data[i][j+3]||data[i][j+2]||data[i][j+1];if(n)period=String(n).trim()}
    });
  }
  var txs=[],tC=0,tD=0;
  for(var i=hdr+1;i<data.length;i++){
    var row=data[i];if(!row||row.every(function(c){return!c}))continue;
    if(String(row[0]||"").toLowerCase().indexOf("нийт")>=0)continue;
    var pn=function(v){return Math.abs(parseFloat(String(v||"0").replace(/[^\d.-]/g,""))||0)};
    var cr=cols.credit!==undefined?pn(row[cols.credit]):0;
    var db=cols.debit!==undefined?pn(row[cols.debit]):0;
    var desc=cols.desc!==undefined?String(row[cols.desc]||"").trim():"";
    var date="";
    if(cols.date!==undefined&&row[cols.date]){var d=row[cols.date];date=d instanceof Date?d.toISOString().slice(0,10):String(d).slice(0,10)}
    if(cr>0||db>0){tC+=cr;tD+=db;txs.push({date:date,cr:cr,db:db,desc:desc,id:i})}
  }
  return{owner:owner,period:period,tC:tC,tD:tD,net:tC-tD,txs:txs};
}
function aCat(d){
  var v=(d||"").toLowerCase();
  if(v.indexOf("хураамж")>=0||v.indexOf("fee")>=0)return"fee";
  if(v.indexOf("шилжүүлэг")>=0)return"transfer";
  if(v.indexOf("хоол")>=0||v.indexOf("ресторан")>=0||v.indexOf("кафе")>=0)return"food";
  if(v.indexOf("такси")>=0||v.indexOf("тээвэр")>=0)return"transport";
  if(v.indexOf("эмнэлэг")>=0)return"health";
  if(v.indexOf("хадгаламж")>=0)return"savings";
  return"other";
}

// MATH ENGINE
// ════════════════════════════════════════════
function calcM(income,exps){
  var sp=0,sv=0,nd=0,wt=0;
  exps.forEach(function(e){
    if(e.isInc)return;
    var c=CATS.find(function(c){return c.id===e.cat});
    if(c&&c.save)sv+=e.amt; else sp+=e.amt;
    if(c&&c.needs)nd+=e.amt;
    if(c&&c.wants)wt+=e.amt;
  });
  var i5=income*.5,i3=income*.3,i2=income*.2;
  var s5=nd<=i5?100:Math.max(0,Math.round(100-(nd-i5)/i5*100));
  var s3=wt<=i3?100:Math.max(0,Math.round(100-(wt-i3)/i3*100));
  var s2=sv>=i2?100:(income>0?Math.round(sv/i2*100):0);
  var health=Math.round((s5+s3+s2)/3);
  var r=0.08/12;
  var fc=[5,10,15,20,30].map(function(y){var n=y*12,fv=sv>0?Math.round(sv*((Math.pow(1+r,n)-1)/r)):0;return{y:y,fv:fv}});
  return{sp:sp,sv:sv,nd:nd,wt:wt,i5:i5,i3:i3,i2:i2,s5:s5,s3:s3,s2:s2,
    health:health,pd:Math.round(sp/30),pw:Math.round(sp/4.33),
    emg:sp*6,emgMo:sv>0?Math.ceil(sp*6/sv):null,fc:fc,bal:income-sp};
}

// PIE SVG
function bPie(data,size){
  if(!data||!data.length)return"";
  var tot=data.reduce(function(s,d){return s+d.v},0)||1;
  var cx=size/2,cy=size/2,R=size*.38,ir=size*.22,angle=-Math.PI/2;
  var paths=data.map(function(d){
    var a=(d.v/tot)*Math.PI*2;
    var x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    angle+=a;
    var x2=cx+R*Math.cos(angle),y2=cy+R*Math.sin(angle);
    var ix1=cx+ir*Math.cos(angle-a),iy1=cy+ir*Math.sin(angle-a);
    var ix2=cx+ir*Math.cos(angle),iy2=cy+ir*Math.sin(angle);
    var lg=a>Math.PI?1:0;
    return'<path d="M'+x1+','+y1+' A'+R+','+R+' 0 '+lg+',1 '+x2+','+y2+' L'+ix2+','+iy2+' A'+ir+','+ir+' 0 '+lg+',0 '+ix1+','+iy1+' Z" fill="'+d.col+'" stroke="#111827" stroke-width="1.5"/>';
  }).join("");
  return'<svg viewBox="0 0 '+size+' '+size+'" style="width:'+size+'px;height:'+size+'px;flex-shrink:0">'+paths+'</svg>';
}

    '<div style="font-size:13px;font-weight:700;color:#F9FAFB;margin-bottom:8px">'+t.allRec+' ('+filtExps.length+')'+(filtExps.length>0?' <span style="color:#ef4444;font-size:11px;font-weight:500">−'+fmt(tot)+'</span>':'')+'</div>'+
    '<div style="max-height:400px;overflow-y:auto">'+
    (filtExps.length===0?'<div style="color:#6B7280;font-size:13px;text-align:center;padding:14px">'+t.nodata+'</div>':
    [...filtExps].reverse().map(function(e){
      var cat=CATS.find(function(c){return c.id===e.cat})||{mn:"📦",kz:"📦",col:"#64748b"};
      return'<div class="row">'+
        '<div class="row-body">'+
          '<div class="row-title">'+esc(e.desc)+(e.fromBank?" 🏦":"")+'</div>'+
          '<div class="row-sub">'+cn(cat,G.lg)+' · '+esc(e.date)+'</div>'+
        '</div>'+
        '<div class="row-right">'+
          '<span class="row-amt '+(e.isInc?"green":"red")+'">'+(e.isInc?"+":"−")+fmtS(e.amt)+'₮</span>'+
          '<button onclick="delExp('+e.id+')" style="padding:5px 9px;border-radius:7px;background:#1f1b1b;border:none;color:#ef4444;font-size:12px;cursor:pointer">'+t.del+'</button>'+
        '</div>'+
      '</div>';
    }).join(""))+
    '</div>'+
  '</div>'
  );
}

// MATH
// ────────────────────────────────────────────
function bMath(){
  var t=T(),m=calcM(G.income,G.exps);
  var svr=Math.round(m.sv/Math.max(G.income,1)*100);
  var spr=Math.min(100,Math.round(m.sp/Math.max(G.income,1)*100));
  var maxFV=m.fc[m.fc.length-1].fv||1;
  var bars=m.fc.map(function(f,i){
    var h=Math.max(4,Math.round((f.fv/maxFV)*86));
    return'<div class="bar-i" style="height:'+h+'px;background:hsl('+(155+i*20)+',65%,55%)"><span class="bar-lbl">'+f.y+(G.lg==="mn"?"ж":"жыл")+'</span></div>';
  }).join("");

  return(
  '<div class="sec-title">🧮 '+t.mathTitle+'</div>'+
  '<div class="card">'+
    '<div style="font-size:13px;font-weight:700;color:#F9FAFB;margin-bottom:10px">'+t.mSum+'</div>'+
    mr("📅",t.perDay, fmt(m.pd),  null)+
    mr("📆",t.perWk,  fmt(m.pw),  null)+
    mr("💎",t.savRate,svr+"%",    svr>=20?"#22c55e":"#f59e0b")+
    mr("📤",t.spRate, spr+"%",    spr<=80?"#22c55e":"#ef4444")+
    mr("🛡",t.emgFund,fmt(m.emg), null)+
    mr("⏳",t.emgMo,  m.emgMo?m.emgMo+(G.lg==="mn"?" сар":" ай"):"—","#6366f1")+
    mr("💰",t.yrSav,  fmt(m.sv*12),"#22c55e")+
    mr("📊",t.yrSp,   fmt(m.sp*12),"#ef4444")+
  '</div>'+
  '<div class="card">'+
    '<div style="font-size:13px;font-weight:700;color:#F9FAFB;margin-bottom:4px">'+t.invTitle+'</div>'+
    '<div style="font-size:11px;color:#6B7280;margin-bottom:12px">'+t.invNote+' · '+fmt(m.sv)+(G.lg==="mn"?"/сар":"/ай")+'</div>'+
    '<div class="bar-chart">'+bars+'</div>'+
    '<div style="margin-top:18px">'+
      m.fc.map(function(f,i){
        return'<div class="row">'+
          '<span style="font-size:12px;color:#9CA3AF">⏳ '+f.y+(G.lg==="mn"?" жил":" жыл")+'</span>'+
          '<span style="font-size:13px;font-weight:700;color:hsl('+(155+i*20)+',65%,55%)">'+fmtS(f.fv)+'₮</span>'+
        '</div>';
      }).join("")+
    '</div>'+
    '<div style="font-size:10px;color:#4B5563;margin-top:8px">📐 FV = PMT × ((1+r)ⁿ − 1) / r</div>'+
  '</div>'+
  '<div class="card card-blue">'+
    '<div style="font-size:13px;font-weight:700;color:#93c5fd;margin-bottom:12px">'+t.rule+'</div>'+
    prog("🏠 "+t.needs+" (50%)",50,"#22c55e",m.nd,m.i5,G.income,t)+
    prog("🎮 "+t.wants+" (30%)",30,"#f59e0b",m.wt,m.i3,G.income,t)+
    prog("💎 "+t.sav+  " (20%)",20,"#f59e0b",m.sv,m.i2,G.income,t)+
  '</div>'
  );
}

function mr(ic,lbl,val,col){
  return'<div class="row">'+
    '<span style="font-size:12px;color:#9CA3AF">'+ic+' '+lbl+'</span>'+
    '<span style="font-size:13px;font-weight:700;color:'+(col||"#F9FAFB")+'">'+val+'</span>'+

}
function prog(lbl,p,col,act,ideal,income,t){
  return'<div class="prog">'+
    '<div class="prog-hd"><span style="color:#D1D5DB">'+lbl+'</span><span style="color:'+col+'">'+fmt(Math.round(income*p/100))+'</span></div>'+
    '<div class="prog-bg"><div class="prog-fill" style="width:'+p+'%;background:'+col+'"></div></div>'+
    '<div class="prog-note">'+t.now+': '+fmt(act)+' · '+t.goal+': '+fmt(Math.round(ideal))+'</div>'+
  '</div>';
}

// ────────────────────────────────────────────
// BIZ (PRO)
// ────────────────────────────────────────────
function bBiz(){
  var t=T();
  var tI=G.bizInc.reduce(function(s,x){return s+x.amt},0);
  var tE=G.bizExp.reduce(function(s,x){return s+x.amt},0);
  var profit=tI-tE;
  var margin=tI>0?Math.round(profit/tI*100):0;
  var roi=tE>0?Math.round(tI/tE*100):0;
  var txAll=[...G.bizInc.map(function(x){return Object.assign({},x,{tp:"inc"})}),...G.bizExp.map(function(x){return Object.assign({},x,{tp:"exp"})})].sort(function(a,b){return(b.time||"").localeCompare(a.time||"")});

  return(
  '<div class="sec-title">🏪 '+t.bizTitle+'</div>'+
  '<div class="card">'+
    '<div style="font-size:12px;color:#9CA3AF;margin-bottom:6px">'+t.bizName+'</div>'+
    '<input class="inp" value="'+esc(G.bizName)+'" placeholder="..." oninput="G.bizName=this.value;persist()">'+
  '</div>'+
  '<div class="biz4">'+
    bzb(t.income,   fmt(tI),     "#22c55e")+bzb(t.expense, fmt(tE),     "#ef4444")+
    bzb(t.bizProfit,fmt(profit),  profit>=0?"#22c55e":"#ef4444")+
    bzb(t.bizMargin,margin+"%",   margin>=30?"#22c55e":margin>=15?"#f59e0b":"#ef4444")+
  '</div>'+
  '<div class="card card-blue">'+
    '<div style="font-size:13px;font-weight:700;color:#93c5fd;margin-bottom:10px">📐 '+(G.lg==="mn"?"Математик тооцоо":"Математикалық есеп")+'</div>'+
    mr("📐",t.bizNetF, fmt(tI)+"−"+fmt(tE)+"="+fmt(profit), profit>=0?"#22c55e":"#ef4444")+
    mr("📊",t.bizMrgF, margin+"%",     margin>=30?"#22c55e":"#f59e0b")+
    mr("💹",t.bizROI,  roi+"%",        roi>=100?"#22c55e":"#f59e0b")+
    mr("📅",t.bizMo,   fmt(profit*30), profit>=0?"#22c55e":"#ef4444")+
    mr("📈",t.bizYr,   fmtS(profit*365)+"₮", profit>=0?"#22c55e":"#ef4444")+
  '</div>'+
  '<div class="card">'+
    '<div style="font-size:13px;font-weight:700;color:#F9FAFB;margin-bottom:10px">'+t.bizAdd+'</div>'+
    '<div class="btn-row" style="margin-bottom:10px">'+
      '<button class="btn '+(G.bizForm.type==="inc"?"btn-green":"btn-gray")+'" onclick="G.bizForm.type=\'inc\';R()">'+t.bizInc+'</button>'+
      '<button class="btn '+(G.bizForm.type==="exp"?"btn-red":"btn-gray")+'" onclick="G.bizForm.type=\'exp\';R()">'+t.bizExp+'</button>'+
    '</div>'+
    '<input class="inp" value="'+esc(G.bizForm.desc)+'" placeholder="..." oninput="G.bizForm.desc=this.value" style="margin-bottom:8px">'+
    '<div style="display:flex;gap:8px;margin-bottom:10px">'+
      '<input class="inp" type="number" value="'+esc(G.bizForm.amt)+'" placeholder="50000" oninput="G.bizForm.amt=this.value" style="flex:1">'+
       '<input class="inp" type="time" value="'+esc(G.bizForm.time)+'" oninput="G.bizForm.time=this.value" style="width:90px">'+
    '</div>'+
    '<button class="btn '+(G.bizForm.type==="inc"?"btn-green":"btn-red")+'" onclick="addBiz()">'+t.saveBtn+'</button>'+
  '</div>'+
  (txAll.length>0?
  '<div class="card">'+
    '<div style="font-size:13px;font-weight:700;color:#F9FAFB;margin-bottom:8px">'+t.bizTx+' ('+txAll.length+')</div>'+
    txAll.map(function(tx){
      return'<div class="row">'+
        '<div class="row-body">'+
          '<div class="row-title">'+(tx.tp==="inc"?"💵 ":"📤 ")+esc(tx.desc)+'</div>'+
          '<div class="row-sub">'+esc(tx.time||"")+'</div>'+
        '</div>'+
        '<div class="row-right">'+
          '<span class="row-amt '+(tx.tp==="inc"?"green":"red")+'">'+(tx.tp==="inc"?"+":"−")+fmt(tx.amt)+'</span>'+
          '<button onclick="delBiz(\''+tx.tp+'\','+tx.id+')" style="padding:5px 9px;border-radius:7px;background:#1f1b1b;border:none;color:#ef4444;font-size:12px;cursor:pointer">✕</button>'+
        '</div>'+
      '</div>';
    }).join("")+
  '</div>':"")
  );
}

  return'<div class="biz-box"><div class="biz-lbl">'+lbl+'</div><div class="biz-val" style="color:'+col+'">'+val+'</div></div>';
}

function setLg(l){G.lg=l;R()}
function setScr(s){G.scr=s;R()}
function setTab(tb){G.tab=tb;G.advShown=0;R()}
function clearStart(){G.exps=[];persist();G.scr="login";R()}
function demoStart(){G.exps=DEMO.map(function(e){return Object.assign({},e)});G.scr="app";R()}
function togMode(){G.aMode=G.aMode==="login"?"register":"login";G.aErr="";R()}
function qLogin(name){G.aName=name;R()}
function closeMod(e){if(e.target===e.currentTarget){G.showPro=0;G.proErr="";R()}}

function doAuth(){
  var t=T(),name=G.aName.trim(),pin=G.aPin.trim();
  if(name.length<2){G.aErr=t.nameSh;R();return}
  if(!/^\d{4}$/.test(pin)){G.aErr=t.pinSh;R();return}
  G.aBusy=1;G.aErr="";R();
  var uid=name.toLowerCase().replace(/\s+/g,"_"),users=gU();
  sha256(uid+":"+pin+":v3").then(function(ph){
    if(G.aMode==="register"){
      if(G.aPin2!==pin){G.aErr=t.pinMM;G.aBusy=0;R();return}
      users[uid]={name:name,ph:ph,at:Date.now()};sU(users);
      sD(uid,{exps:[],income:1200000,bizName:"",bizInc:[],bizExp:[]});
      G.user={name:name,uid:uid};G.exps=[];G.income=1200000;
      G.bizName="";G.bizInc=[];G.bizExp=[];
      G.proOn=isProOn(uid);G.aBusy=0;G.scr="app";R();
    }else{
      if(!users[uid]){G.aErr=t.noUser;G.aBusy=0;R();return}
      if(users[uid].ph!==ph){G.aErr=t.pinWrong;G.aBusy=0;R();return}
      var d=gD(uid);
      G.user={name:users[uid].name,uid:uid};
      G.exps=(d&&d.exps)||[];G.income=(d&&d.income)||1200000;
      G.bizName=(d&&d.bizName)||"";G.bizInc=(d&&d.bizInc)||[];G.bizExp=(d&&d.bizExp)||[];
      G.proOn=isProOn(uid);G.aBusy=0;G.scr="app";R();
    }
  });
}

function doLogout(){
  G.user=null;G.scr="welcome";
  G.exps=DEMO.map(function(e){return Object.assign({},e)});
  G.bank=null;G.adv=[];G.advShown=0;G.aName="";G.aPin="";G.aPin2="";G.aErr="";R();
}

function actPro(){
  if(!G.user){G.proErr=G.lg==="mn"?"Эхлээд нэвтэрнэ үү":"Алдымен кіріңіз";R();return}
  var r=chkPro(G.proCode,G.user.uid);
  if(r.ok){G.proOn=1;G.proErr="";G.showPro=0;G.proCode="";R()}
  else{G.proErr=T().proErr;R()}
}

function hdlFile(inp){
  var f=inp.files[0];if(!f)return;
  G.bankLoad=1;G.bankErr="";G.bank=null;R();
  var rd=new FileReader();
  rd.onload=function(ev){
    try{
      var wb=XLSX.read(ev.target.result,{type:"array",cellDates:true}),best=null;
      wb.SheetNames.forEach(function(sh){
        var raw=XLSX.utils.sheet_to_json(wb.Sheets[sh],{header:1,defval:null,raw:false});
        var r=parseBank(raw);
        if(r&&r.txs.length>0&&(!best||r.txs.length>best.txs.length))best=Object.assign({},r,{sh:sh});
      });
      if(best){
        G.bank=best;
        var ne=best.txs.map(function(tx,i){
          return{id:Date.now()+i,desc:tx.desc||(tx.cr>0?"Орлого":"Зарлага"),
            amt:tx.cr>0?tx.cr:tx.db,cat:tx.cr>0?"other":aCat(tx.desc),
            date:tx.date||TODAY,isInc:tx.cr>0,fromBank:1};
        });
        G.exps=G.exps.filter(function(e){return!e.fromBank}).concat(ne);
        if(best.tC>0)G.income=best.tC;
        persist();
      }else G.bankErr=T().bankErr;
    }catch(err){G.bankErr=String(err)}
    G.bankLoad=0;R();
  };
  rd.readAsArrayBuffer(f);
}

function addExp(){
  if(!G.form.desc||!G.form.amt)return;
  G.exps.push({id:Date.now(),desc:G.form.desc,amt:parseFloat(G.form.amt)||0,
    cat:G.form.cat,date:G.form.date,isInc:0});
  persist();G.form={desc:"",amt:"",cat:"food",date:TODAY};R();
}
function delExp(id){G.exps=G.exps.filter(function(e){return e.id!==id});persist();R()}
function runAdv(){G.adv=genAdv(calcM(G.income,G.exps),G.income,G.lg);G.advShown=1;R()}
function addBiz(){
  if(!G.bizForm.desc||!G.bizForm.amt)return;
  var tx={id:Date.now(),desc:G.bizForm.desc,amt:parseFloat(G.bizForm.amt)||0,
    time:G.bizForm.time||new Date().toTimeString().slice(0,5)};
  if(G.bizForm.type==="inc")G.bizInc.push(tx);else G.bizExp.push(tx);
  persist();G.bizForm.desc="";G.bizForm.amt="";R();
}
function delBiz(tp,id){
  if(tp==="inc")G.bizInc=G.bizInc.filter(function(x){return x.id!==id});
  else G.bizExp=G.bizExp.filter(function(x){return x.id!==id});
  persist();R();
}
