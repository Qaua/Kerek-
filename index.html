// ═══════════════════════════════════════════════════════
// SHA256 хэш
// ═══════════════════════════════════════════════════════
async function sha256(txt){
  try{
    var buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(txt));
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0")}).join("");
  }catch(e){
    var h=0;
    for(var i=0;i<txt.length;i++) h=(Math.imul(31,h)+txt.charCodeAt(i))|0;
    return Math.abs(h).toString(16).padStart(8,"0");
  }
}

function deviceId(){
  try{
    var r=[navigator.userAgent,screen.width,screen.height].join("|");
    var h=5381;for(var i=0;i<r.length;i++) h=((h<<5)+h)^r.charCodeAt(i);
    return Math.abs(h>>>0).toString(36).toUpperCase();
  }catch{return"DEV"}
}
function checkProCode(code,uid){
  try{
    var db=JSON.parse(localStorage.getItem("ad_pro")||"{}");
    var c=code.trim().toUpperCase(), dev=deviceId();
    if(PRO_CODES.indexOf(c)<0) return{ok:false,err:"Код буруу / Код қате"};
    if(db[c] && db[c]!==uid+":"+dev) return{ok:false,err:"Өөр хэрэглэгч ашигладаг / Басқа пайдаланушы"};
    db[c]=uid+":"+dev; localStorage.setItem("ad_pro",JSON.stringify(db));
    return{ok:true};
  }catch(e){return{ok:false,err:"Алдаа"}}
}
function isProActive(uid){
  try{
    var db=JSON.parse(localStorage.getItem("ad_pro")||"{}"), dev=deviceId();
    return PRO_CODES.some(function(k){return db[k]===uid+":"+dev});
  }catch{return false}
}

// МАТЕМАТИКА ENGINE

function calcMetrics(income,exps){
  var spent=0,saved=0,needs=0,wants=0;
  exps.forEach(function(e){
    if(e.isInc) return;
    var cat=CATS.find(function(c){return c.id===e.cat});
    if(cat && cat.saving) saved+=e.amt;
    else spent+=e.amt;
    if(cat && cat.needs) needs+=e.amt;
    if(cat && cat.wants) wants+=e.amt;
  });
  var i50=income*.5,i30=income*.3,i20=income*.2;
  var s50=needs<=i50?100:Math.max(0,Math.round(100-(needs-i50)/i50*100));
  var s30=wants<=i30?100:Math.max(0,Math.round(100-(wants-i30)/i30*100));
  var s20=saved>=i20?100:(income>0?Math.round(saved/i20*100):0);
  var health=Math.round((s50+s30+s20)/3);
  var perDay=Math.round(spent/30);
  var perWeek=Math.round(spent/4.33);
  var emgTarget=spent*6;
  var monthsToEmg=saved>0?Math.ceil(emgTarget/saved):null;
  var r=0.08/12;
  var forecasts=[5,10,15,20,30].map(function(y){
    var n=y*12;
    var fv=saved>0?Math.round(saved*((Math.pow(1+r,n)-1)/r)):0;
    return{y:y,fv:fv};
  });
  return{spent:spent,saved:saved,needs:needs,wants:wants,
    i50:i50,i30:i30,i20:i20,s50:s50,s30:s30,s20:s20,health:health,
    perDay:perDay,perWeek:perWeek,emgTarget:emgTarget,monthsToEmg:monthsToEmg,
    forecasts:forecasts,balance:income-spent};
}

// БАНК PARSER
// ═══════════════════════════════════════════════════════
var COL_H={
  date:["огноо","гүйлгээний огноо","date","он сар өдөр"],
  credit:["кредит гүйлгээ","кредит","орлого","credit","нэмэгдэл"],
  debit:["дебит гүйлгээ","дебит","зарлага","debit","хасагдал"],
  desc:["гүйлгээний утга","утга","description","тайлбар"]
};
function detectCols(row){
  var m={};
  (row||[]).forEach(function(c,i){
    var v=String(c||"").toLowerCase().trim();
    Object.keys(COL_H).forEach(function(k){
      if(!m[k] && COL_H[k].some(function(h){return v.indexOf(h)>=0})) m[k]=i;
    });
  });
  return m;
}
function parseBank(data){
  var hdr=-1,cols={};
  for(var i=0;i<Math.min(data.length,20);i++){
    var m=detectCols(data[i]);
    if(Object.keys(m).length>=3){hdr=i;cols=m;break;}
  }
  if(hdr<0) return null;
  var owner="",period="";
  for(var i=0;i<hdr;i++){
    (data[i]||[]).forEach(function(c,j){
      var v=String(c||"").toLowerCase();
      if(v.indexOf("хэрэглэгч")>=0){var n=data[i][j+3]||data[i][j+2]||data[i][j+1];if(n)owner=String(n).trim();}
      if(v.indexOf("интервал")>=0){var n=data[i][j+3]||data[i][j+2]||data[i][j+1];if(n)period=String(n).trim();}
    });
  }
  var txs=[],totC=0,totD=0;
  for(var i=hdr+1;i<data.length;i++){
    var row=data[i];
    if(!row||row.every(function(c){return!c})) continue;
    if(String(row[0]||"").toLowerCase().indexOf("нийт")>=0) continue;
    var pn=function(v){return Math.abs(parseFloat(String(v||"0").replace(/[^\d.-]/g,""))||0)};
    var cr=cols.credit!==undefined?pn(row[cols.credit]):0;
    var db=cols.debit!==undefined?pn(row[cols.debit]):0;
    var desc=cols.desc!==undefined?String(row[cols.desc]||"").trim():"";
    var date="";
    if(cols.date!==undefined && row[cols.date]){
      var d=row[cols.date];
      date=d instanceof Date?d.toISOString().slice(0,10):String(d).slice(0,10);
    }
    if(cr>0||db>0){totC+=cr;totD+=db;txs.push({date:date,cr:cr,db:db,desc:desc,id:i});}
  }
  return{owner:owner,period:period,totC:totC,totD:totD,net:totC-totD,txs:txs};
}
function autoCat(d){
  var v=(d||"").toLowerCase();
  if(v.indexOf("хураамж")>=0||v.indexOf("fee")>=0) return"fee";
  if(v.indexOf("шилжүүлэг")>=0) return"transfer";
  if(v.indexOf("хоол")>=0||v.indexOf("ресторан")>=0||v.indexOf("кафе")>=0) return"food";
  if(v.indexOf("такси")>=0||v.indexOf("тээвэр")>=0) return"transport";
  if(v.indexOf("эмнэлэг")>=0) return"health";
  if(v.indexOf("хадгаламж")>=0||v.indexOf("депозит")>=0) return"savings";
  return"other";
}

function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==="className") e.className=attrs[k];
    else if(k==="style") Object.assign(e.style,attrs[k]);
    else if(k.slice(0,2)==="on") e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else if(k==="htmlFor") e.htmlFor=attrs[k];
    else e.setAttribute(k,attrs[k]);
  });
  if(children) [].concat(children).forEach(function(c){
    if(c===null||c===undefined) return;
    if(typeof c==="string"||typeof c==="number") e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  });
  return e;
}
function div(cls,children,style){
  return el("div",{className:cls||"",style:style||{}},children);
}
function span(txt,style){return el("span",{style:style||{}},txt)}
function btn(txt,cls,onClick,style){
  return el("button",{className:"btn "+(cls||""),style:style||{},onClick:onClick},txt);
}
function inp(type,val,placeholder,onInput,style,extra){
  var attrs=Object.assign({type:type||"text",value:val||"",placeholder:placeholder||"",
    className:"inp",style:style||{}},extra||{});
  var e=el("input",attrs);
  if(onInput) e.addEventListener("input",function(){onInput(e.value)});
  return e;
}
function card(children,extraStyle){
  return el("div",{className:"card",style:extraStyle||{}},children);
}

// ═══════════════════════════════════════════════════════
// MINI CHARTS (순수 SVG)
// ═══════════════════════════════════════════════════════
function miniPie(data,size){
  size=size||130;
  if(!data||!data.length) return div("");
  var total=data.reduce(function(s,d){return s+d.v},0)||1;
  var cx=size/2,cy=size/2,r=size*.38,ir=size*.22;
  var angle=-Math.PI/2;
  var ns="http://www.w3.org/2000/svg";
  var svg=document.createElementNS(ns,"svg");
  svg.setAttribute("viewBox","0 0 "+size+" "+size);
  svg.style.width=size+"px"; svg.style.height=size+"px";
  data.forEach(function(d){
    var a=(d.v/total)*Math.PI*2;
    var x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=a;
    var x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    var ix1=cx+ir*Math.cos(angle-a),iy1=cy+ir*Math.sin(angle-a);
    var ix2=cx+ir*Math.cos(angle),iy2=cy+ir*Math.sin(angle);
    var lg=a>Math.PI?1:0;
    var path=document.createElementNS(ns,"path");
    path.setAttribute("d","M"+x1+","+y1+" A"+r+","+r+" 0 "+lg+",1 "+x2+","+y2+" L"+ix2+","+iy2+" A"+ir+","+ir+" 0 "+lg+",0 "+ix1+","+iy1+" Z");
    path.setAttribute("fill",d.col);
    path.setAttribute("stroke","#0d0d14");
    path.setAttribute("stroke-width","1");
    svg.appendChild(path);
  });
  return svg;
}

function miniBar(data,height){
  height=height||100;
  if(!data||!data.length) return div("");
  var max=Math.max.apply(null,data.map(function(d){return d.v}))||1;
  var wrap=div("bar-wrap",[]);
  wrap.style.height=(height+20)+"px";
  data.forEach(function(d,i){
    var pct=d.v/max;
    var bh=Math.max(4,Math.round(pct*height));
    var hue=155+i*18;
    var item=div("bar-item",[]);
    item.style.height=bh+"px";
    item.style.background="hsl("+hue+",65%,55%)";
    item.style.position="relative";
    item.style.alignSelf="flex-end";
    var lbl=document.createElement("div");
    lbl.style.cssText="position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(255,255,255,.4);white-space:nowrap";
    lbl.textContent=d.l;
    item.appendChild(lbl);
    wrap.appendChild(item);
  });
  return wrap;
}

// ── BANK ───────────────────────────────────────────────
function renderBank(mn){
  var nodes=[];
  nodes.push(el("div",{style:{fontSize:"14px",fontWeight:"800"}},"🏦 "+(mn?"Банкны хуулга":"Банк анықтамасы")));

  // Upload
  var fileLabel=el("label",{style:{padding:"11px 22px",borderRadius:"10px",border:"none",background:"#6366f1",color:"#fff",fontSize:"12px",fontWeight:"700",cursor:"pointer",display:"inline-block"}},
    mn?"📂 Файл сонгох":"📂 Файл таңдау");
  var fileInp=el("input",{type:"file",accept:".xlsx,.xls",style:{display:"none"}});
  fileInp.addEventListener("change",function(ev){
    var f=ev.target.files[0]; if(!f) return;
    setState({bankLoad:true,bankErr:"",bank:null});
    var rd=new FileReader();
    rd.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:"array",cellDates:true});
        var best=null;
        wb.SheetNames.forEach(function(sh){
          var raw=XLSX.utils.sheet_to_json(wb.Sheets[sh],{header:1,defval:null,raw:false});
          var r=parseBank(raw);
          if(r&&r.txs.length>0&&(!best||r.txs.length>best.txs.length)) best=Object.assign({},r,{sh:sh});
        });
        if(best){
          var ne=best.txs.map(function(tx){
            return{id:Date.now()+tx.id+Math.random(),
              desc:tx.desc||(tx.cr>0?"Орлого":"Зарлага"),
              amt:tx.cr>0?tx.cr:tx.db,
              cat:tx.cr>0?"other":autoCat(tx.desc),
              date:tx.date||TODAY,isInc:tx.cr>0,fromBank:true};
          });
          var merged=S.exps.filter(function(e){return!e.fromBank}).concat(ne);
          S.exps=merged;
          if(best.totC>0) S.income=best.totC;
          persist();
          setState({bank:best,bankLoad:false});
        } else setState({bankErr:mn?"Файл уншихад алдаа. Монгол банкны Excel хуулга оруулна уу.":"Файл оқылмады.",bankLoad:false});
      }catch(err){setState({bankErr:String(err),bankLoad:false});}
    };
    rd.readAsArrayBuffer(f);
    ev.target.value="";
  });
  fileLabel.appendChild(fileInp);

  nodes.push(card([
    el("div",{style:{textAlign:"center",padding:"28px 10px"}},[
      el("div",{style:{fontSize:"34px",marginBottom:"9px"}},"📂"),
      el("div",{style:{fontSize:"13px",fontWeight:"700",marginBottom:"4px"}},mn?"Банкны хуулга оруулах (.xlsx)":"Банк анықтамасын жүктеу (.xlsx)"),
      el("div",{style:{fontSize:"11px",color:"rgba(255,255,255,.4)",marginBottom:"14px"}},"Хаан · Голомт · Хас · Ард банк"),
      fileLabel,
    ]),
  ],{background:"rgba(99,102,241,.05)",border:"2px dashed rgba(99,102,241,.3)"}));

  if(S.bankLoad) nodes.push(card([
    el("div",{style:{textAlign:"center",padding:"18px"}},[
      el("div",{style:{fontSize:"22px"}},"⏳"),
      el("div",{style:{fontSize:"12px",color:"rgba(255,255,255,.4)",marginTop:"6px"}},mn?"Уншиж байна...":"Оқылуда..."),
    ]),
  ]));
  if(S.bankErr) nodes.push(card([
    el("div",{style:{fontSize:"12px",color:"#fca5a5"}},"⚠️ "+S.bankErr),
  ],{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.25)"}));

  if(S.bank){
    var bk=S.bank;
    nodes.push(card([
      el("div",{style:{fontSize:"13px",fontWeight:"700",marginBottom:"4px"}},"📋 "+bk.sh+(bk.owner?" — "+bk.owner:"")),
      bk.period?el("div",{style:{fontSize:"10px",color:"rgba(255,255,255,.4)",marginBottom:"10px"}},"📅 "+bk.period):null,
      el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}},
        [{lbl:mn?"Нийт орлого":"Жалпы кіріс",v:fmt(bk.totC),c:"#22c55e"},
         {lbl:mn?"Нийт зарлага":"Жалпы шығыс",v:fmt(bk.totD),c:"#ef4444"},
         {lbl:mn?"Цэвэр урсгал":"Таза ағыс",v:fmt(bk.net),c:bk.net>=0?"#22c55e":"#ef4444"},
         {lbl:mn?"Гүйлгээний тоо":"Мәміле саны",v:bk.txs.length+(mn?" ш":" дана"),c:"#6366f1"},
        ].map(function(x){
          return el("div",{style:{background:"rgba(255,255,255,.03)",borderRadius:"10px",padding:"11px",textAlign:"center"}},[
            el("div",{style:{fontSize:"9px",color:"rgba(255,255,255,.4)"}},x.lbl),
            el("div",{style:{fontSize:"14px",fontWeight:"800",color:x.c,marginTop:"3px"}},x.v),
          ]);
        })
      ),
    ].filter(Boolean)));

    // TX list
    var txList=el("div",{style:{maxHeight:"280px",overflowY:"auto"}},
      bk.txs.map(function(tx){
        return el("div",{className:"row"},[
          el("div",{style:{flex:"1",minWidth:"0",marginRight:"8px"}},[
            el("div",{style:{fontSize:"11px",fontWeight:"600",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}},tx.desc),
            el("div",{style:{fontSize:"9px",color:"rgba(255,255,255,.35)"}},tx.date),
          ]),
          el("div",{style:{textAlign:"right",flexShrink:"0"}},[
            tx.cr>0?el("div",{style:{fontSize:"11px",fontWeight:"700",color:"#22c55e"}},"+"+fmt(tx.cr)):null,
            tx.db>0?el("div",{style:{fontSize:"11px",fontWeight:"700",color:"#ef4444"}},"−"+fmt(tx.db)):null,
          ].filter(Boolean)),
        ]);
      })
    );
    nodes.push(card([
      el("div",{style:{fontSize:"12px",fontWeight:"700",marginBottom:"8px"}},(mn?"Гүйлгээнүүд":"Мәмілелер")+" ("+bk.txs.length+")"),
      txList,
    ]));
  }
  return nodes;
}

      "📐 "+(mn?"50/30/20 дүрэм":"50/30/20 ережесі")),
    [
      {lbl:"🏠 "+(mn?"Хэрэгцээ (50%)":"Қажеттілік (50%)"),p:50,c:"#22c55e",act:m.needs,id:m.i50},
      {lbl:"🎮 "+(mn?"Хүсэл (30%)":"Тілек (30%)"),p:30,c:"#f59e0b",act:m.wants,id:m.i30},
      {lbl:"💎 "+(mn?"Хадгаламж (20%)":"Жинақ (20%)"),p:20,c:"#f59e0b",act:m.saved,id:m.i20},
    ].map(function(r){
      return el("div",{style:{marginBottom:"13px"}},[
        el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"4px"}},[
          el("span",{},r.lbl),
          el("span",{style:{fontWeight:"700",color:r.c}},fmt(Math.round(S.income*r.p/100))),
        ]),
        el("div",{style:{background:"rgba(255,255,255,.08)",borderRadius:"7px",height:"9px"}},[
          el("div",{style:{width:r.p+"%",height:"100%",borderRadius:"7px",background:r.c}}),
        ]),
        el("div",{style:{fontSize:"9px",color:"rgba(255,255,255,.35)",marginTop:"3px"}},
          (mn?"Одоо":"Қазір")+": "+fmt(r.act)+" · "+(mn?"Зорилго":"Мақсат")+": "+fmt(Math.round(r.id))),
      ]);
    }),
  ],{background:"rgba(99,102,241,.06)",border:"1px solid rgba(99,102,241,.2)"}));

  return nodes;
}

// ── TIPS ───────────────────────────────────────────────
function renderTips(mn){
  var tips=mn?TIPS_MN:TIPS_KZ;
  return [el("div",{style:{fontSize:"14px",fontWeight:"800"}},"💡 "+(mn?"Зөвлөгөө":"Кеңестер"))].concat(
    tips.map(function(t,i){
      return card([
        el("div",{style:{fontSize:"12px",fontWeight:"700",color:"hsl("+(140+i*18)+",60%,65%)",marginBottom:"5px"}},t[0]),
        el("div",{style:{fontSize:"12px",lineHeight:"1.75"}},t[1]),
      ],{borderLeft:"3px solid hsl("+(140+i*18)+",60%,50%)",padding:"13px"});
    })
  );
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render(){
  var app=document.getElementById("app");
  app.innerHTML="";
  var node;
  if(S.scr==="welcome") node=renderWelcome();
  else if(S.scr==="login") node=renderLogin();
  else node=renderApp();
  app.appendChild(node);
}

// ═══════════════════════════════════════════════════════
// XLSX LOAD
// ═══════════════════════════════════════════════════════
var xlsxScript=document.createElement("script");
xlsxScript.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
xlsxScript.onload=function(){render();};
xlsxScript.onerror=function(){render();};
document.head.appendChild(xlsxScript);
</script>
